<body>

<header>
  <h1>MediaPrivacy</h1>
  <p>Convert, compress &amp; clean files &mdash; processed 100% in your browser. Nothing is uploaded.</p>
</header>

<div id="errPanel" class="hidden"><span id="errMsg"></span><button id="errX" title="Dismiss">&times;</button></div>

<main id="cats"></main>

<footer>Files never leave your device. Keyboard: <b>1&ndash;4</b> jump to a category &middot; <b>Esc</b> closes a tool.</footer>

<script>
'use strict';
/* ============================ helpers ============================ */
const $ = id => document.getElementById(id);
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
const fmtSize = b => b < 1024 ? b + ' B' : b < 1048576 ? (b / 1024).toFixed(1) + ' KB' : b < 1073741824 ? (b / 1048576).toFixed(1) + ' MB' : (b / 1073741824).toFixed(2) + ' GB';
const stripExt = n => n.replace(/\.[^.]+$/, '');
const extOf = n => (n.match(/\.[^.]+$/) || [''])[0].toLowerCase();

function showError(msg) { $('errMsg').textContent = msg; $('errPanel').classList.remove('hidden'); }
$('errX') && $('errX').addEventListener('click', () => $('errPanel').classList.add('hidden'));

function readBytes(fileOrBlob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(new Uint8Array(r.result));
    r.onerror = () => rej(new Error('Failed to read file.'));
    r.readAsArrayBuffer(fileOrBlob);
  });
}

function loadImage(blob) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.onerror = () => { URL.revokeObjectURL(url); rej(new Error('Could not decode this image — the file may be corrupt or in an unsupported format.')); };
    img.src = url;
  });
}

function canvasToBlob(canvas, type, quality) {
  return new Promise((res, rej) =>
    canvas.toBlob(b => b ? res(b) : rej(new Error('Image encoding failed — the image may exceed browser canvas limits.')), type, quality));
}

function drawToCanvas(src, w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(src, 0, 0, w, h);
  return c;
}

function downloadBlob(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

async function zipFiles(files) {
  const entries = {};
  for (const f of files) entries[f.name] = new Uint8Array(await f.blob.arrayBuffer());
  return new Blob([fflate.zipSync(entries, { level: 0 })], { type: 'application/zip' });
}

const MAX_MEDIA = 500 * 1048576;
const isVideoFile = f => f.type.startsWith('video/') || /\.(mp4|mov|avi|mkv|webm|m4v|wmv|flv|3gp|ogv)$/i.test(f.name);
const isAudioFile = f => f.type.startsWith('audio/') || /\.(mp3|wav|m4a|ogg|aac|flac|wma|opus)$/i.test(f.name);
function checkMediaSize(f) {
  if (f.size > MAX_MEDIA) throw new Error(`File is too large (${fmtSize(f.size)}). In-browser conversion is limited to 500 MB by browser memory constraints.`);
}
function vVideo(f) { if (!isVideoFile(f)) throw new Error('Please select a video file (MP4, MOV, AVI, MKV, WebM…).'); checkMediaSize(f); }
function vAudio(f) { if (!isAudioFile(f) && !isVideoFile(f)) throw new Error('Please select an audio file (MP3, WAV, M4A, OGG, FLAC…).'); checkMediaSize(f); }

/* ============================ FFmpeg manager ============================
   The -st build executes ffmpeg.run() synchronously — on the main thread it
   would freeze the tab for the whole encode. So FFmpeg lives in a dedicated
   Web Worker; the page only exchanges bytes and progress messages with it. */
const FFMPEG_LIB = 'https://cdn.jsdelivr.net/npm/@flemist/ffmpeg.wasm-st@0.10.1/dist/ffmpeg.min.js';
const FFMPEG_CORE = 'https://cdn.jsdelivr.net/npm/@flemist/ffmpeg.wasm-core-st@0.10.0/dist/ffmpeg-core.js';
const FFMPEG_WORKER_SRC = `
// Minimal document shim: the wrapper's URL-resolution helper (<base>/<a> trick)
// needs one; our URLs are already absolute, so property pass-through is correct.
self.document = {
  createElement: () => ({ href: '' }),
  getElementsByTagName: () => [{ appendChild() {}, removeChild() {} }]
};
importScripts('${FFMPEG_LIB}');
// Pre-load the core and pin file resolution to absolute CDN URLs: the wrapper's
// own loader needs document (absent in workers) and its locateFile only handles
// the window case. With createFFmpegCore pre-defined, the wrapper skips both.
importScripts('${FFMPEG_CORE}');
const CORE_DIR = '${FFMPEG_CORE}'.replace(/[^/]+$/, '');
const realCore = self.createFFmpegCore;
self.createFFmpegCore = opts => realCore(Object.assign({}, opts, {
  locateFile: p => CORE_DIR + p,
  mainScriptUrlOrBlob: '${FFMPEG_CORE}'
}));
let ffmpeg = null;
self.onmessage = async (e) => {
  const msg = e.data;
  try {
    if (msg.type === 'load') {
      if (!ffmpeg) {
        const factory = self.createFFmpeg || (self.FFmpeg && self.FFmpeg.createFFmpeg);
        if (typeof factory !== 'function') throw new Error('The FFmpeg library failed to load from the CDN — check your connection and refresh the page.');
        ffmpeg = factory({ log: false, corePath: '${FFMPEG_CORE}' });
        await ffmpeg.load();
      }
      self.postMessage({ id: msg.id, type: 'done' });
      return;
    }
    if (msg.type === 'run') {
      ffmpeg.FS('writeFile', msg.inName, new Uint8Array(msg.bytes));
      ffmpeg.setProgress(({ ratio }) => {
        if (ratio >= 0 && ratio <= 1) self.postMessage({ id: msg.id, type: 'progress', ratio });
      });
      try {
        await ffmpeg.run(...msg.args);
        let out;
        try { out = ffmpeg.FS('readFile', msg.outName); }
        catch (err) { throw new Error('FFmpeg produced no output — the file may be corrupt or use an unsupported codec.'); }
        if (!out || !out.length) throw new Error('FFmpeg produced an empty output file.');
        self.postMessage({ id: msg.id, type: 'done', bytes: out.buffer }, [out.buffer]);
      } finally {
        try { ffmpeg.setProgress(() => {}); } catch (err) {}
        for (const n of [msg.inName, msg.outName]) { try { ffmpeg.FS('unlink', n); } catch (err) {} }
      }
    }
  } catch (err) {
    self.postMessage({ id: msg.id, type: 'error', message: err.message || String(err) });
  }
};`;

const FF = {
  worker: null, loaded: false, loading: null, busy: false, msgCounter: 0, pending: new Map(),
  ensureWorker() {
    if (this.worker) return;
    const url = URL.createObjectURL(new Blob([FFMPEG_WORKER_SRC], { type: 'application/javascript' }));
    this.worker = new Worker(url);
    URL.revokeObjectURL(url);
    this.worker.onmessage = e => {
      const m = e.data, p = this.pending.get(m.id);
      if (!p) return;
      if (m.type === 'progress') { if (p.onRatio) p.onRatio(m.ratio); return; }
      this.pending.delete(m.id);
      if (m.type === 'error') p.reject(new Error(m.message));
      else p.resolve(m.bytes ? new Uint8Array(m.bytes) : null);
    };
    this.worker.onerror = e => {
      const err = new Error('FFmpeg worker crashed' + (e.message ? ': ' + e.message : '') + '. Please try again.');
      for (const p of this.pending.values()) p.reject(err);
      this.pending.clear();
      try { this.worker.terminate(); } catch (x) {}
      this.worker = null; this.loaded = false; this.loading = null; this.busy = false;
    };
  },
  call(msg, onRatio, transfer) {
    this.ensureWorker();
    const id = ++this.msgCounter;
    return new Promise((resolve, reject) => {
      this.pending.set(id, { resolve, reject, onRatio });
      this.worker.postMessage(Object.assign({ id }, msg), transfer || []);
    });
  },
  async load() {
    if (this.loaded) return;
    if (!this.loading) {
      this.loading = this.call({ type: 'load' }).then(() => { this.loaded = true; });
      this.loading.catch(() => { this.loading = null; });
    }
    return this.loading;
  },
  // One job at a time; unique MEMFS names; input/output buffers are transferred, not copied.
  async run(inputExt, inputBytes, buildArgs, outputExt, onRatio) {
    if (this.busy) throw new Error('Another conversion is already running — please wait for it to finish.');
    this.busy = true;
    try {
      const n = ++this.msgCounter;
      const inName = `in${n}${inputExt || '.bin'}`, outName = `out${n}${outputExt}`;
      return await this.call(
        { type: 'run', inName, outName, args: buildArgs(inName, outName), bytes: inputBytes.buffer },
        onRatio, [inputBytes.buffer]);
    } finally {
      this.busy = false;
    }
  }
};

async function ffmpegJob(ctx, file, buildArgs, outputExt, maxPct = 90) {
  if (!FF.loaded) { ctx.progress('Loading FFmpeg engine (~25 MB, one-time download)…', 5); await FF.load(); }
  ctx.progress('Reading file…', 12);
  const bytes = await readBytes(file);

/* ============================ metadata stripping (throws on failure — never silently returns the original) ============================ */
const CANVAS_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
async function stripImageMeta(blob, type) {
  if (!CANVAS_TYPES.includes(type))
    throw new Error(`Cannot safely remove metadata from ${type || 'this image format'} — it would require lossy format conversion. Supported: JPEG, PNG, WebP.`);
  const img = await loadImage(blob);
  const canvas = drawToCanvas(img, img.naturalWidth, img.naturalHeight);
  return canvasToBlob(canvas, type, type === 'image/jpeg' ? 0.95 : undefined);
}

/* ============================ PDF helpers ============================ */
async function loadPdfLib(bytes) {
  try { return await PDFLib.PDFDocument.load(bytes); }
  catch (e) {
    if (/encrypt/i.test(String(e && e.message || e))) throw new Error('This PDF is password-protected and cannot be processed.');
    throw new Error('Could not read this PDF: ' + ((e && e.message) || e));
  }
}
function clearPdfMeta(doc) {
  doc.setTitle(''); doc.setAuthor(''); doc.setSubject(''); doc.setKeywords([]);
  doc.setProducer(''); doc.setCreator('');
  const d = new Date(0);
  doc.setCreationDate(d); doc.setModificationDate(d);
}
async function savePdf(doc) {
  clearPdfMeta(doc);
  const bytes = await doc.save({ useObjectStreams: true });
  return new Blob([bytes], { type: 'application/pdf' });
}

async function openPdfJs(file) {
  const bytes = await readBytes(file); // fresh read each time — no ArrayBuffer reuse, no detachment bugs
  try { return await pdfjsLib.getDocument({ data: bytes }).promise; }
  catch (e) { throw new Error('Could not read this PDF: ' + ((e && e.message) || e)); }
}

const PIXEL_BUDGET = 16000000; // safe canvas ceiling across browsers
async function renderPdfPage(pdf, pageNum, targetScale) {
  const page = await pdf.getPage(pageNum);
  const vp1 = page.getViewport({ scale: 1 });
  let scale = targetScale;
  if (vp1.width * vp1.height * scale * scale > PIXEL_BUDGET)
    scale = Math.sqrt(PIXEL_BUDGET / (vp1.width * vp1.height));
  const viewport = page.getViewport({ scale });
  const canvas = document.createElement('canvas');
  canvas.width = Math.floor(viewport.width);
  canvas.height = Math.floor(viewport.height);
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  return { canvas, pageWidth: vp1.width, pageHeight: vp1.height };
}

function parsePageRanges(input, maxPages) {
  const pages = new Set();
  for (const part of String(input || '').split(',')) {
    const m = part.trim().match(/^(\d+)(?:\s*-\s*(\d+))?$/);
    if (!m) continue;
    const a = parseInt(m[1], 10), b = m[2] ? parseInt(m[2], 10) : a;
    for (let i = a; i <= b; i++) if (i >= 1 && i <= maxPages) pages.add(i);
  }
  const arr = [...pages].sort((x, y) => x - y);
  if (!arr.length) throw new Error(`No valid pages in "${input}" — this document has ${maxPages} page(s). Example: 1-3, 5, 8`);
  return arr;
}

/* --- PDF compression Tier 2: recompress embedded JPEG images in place, keep text/vectors --- */
async function decodeToDrawable(blob) {
  if (window.createImageBitmap) return createImageBitmap(blob);
  const img = await loadImage(blob);
  return { width: img.naturalWidth, height: img.naturalHeight, _img: img, close() {} };
}
async function recompressPdfImages(doc, quality, maxDim, onProgress) {
  const { PDFRawStream, PDFName, PDFNumber, PDFArray, PDFRef } = PDFLib;
  const lookup = v => (v instanceof PDFRef ? doc.context.lookup(v) : v);
  const objs = doc.context.enumerateIndirectObjects();
  let recompressed = 0, scanned = 0;
  for (const [ref, obj] of objs) {
    scanned++;
    if (!(obj instanceof PDFRawStream)) continue;
    try {
      const dict = obj.dict;
      if (lookup(dict.get(PDFName.of('Subtype'))) !== PDFName.of('Image')) continue;
      let filter = lookup(dict.get(PDFName.of('Filter')));
      if (filter instanceof PDFArray) filter = filter.size() === 1 ? lookup(filter.get(0)) : null;
      if (filter !== PDFName.of('DCTDecode')) continue;         // only plain JPEG streams
      if (dict.get(PDFName.of('SMask'))) continue;              // skip masked images — never corrupt transparency
      const srcBytes = obj.contents;
      if (!srcBytes || srcBytes.length < 20000) continue;       // not worth touching small images
      const bmp = await decodeToDrawable(new Blob([srcBytes], { type: 'image/jpeg' }));
      const ratio = Math.min(1, maxDim / Math.max(bmp.width, bmp.height));
      const w = Math.max(1, Math.round(bmp.width * ratio)), h = Math.max(1, Math.round(bmp.height * ratio));
      const canvas = drawToCanvas(bmp._img || bmp, w, h);
      bmp.close();
      const newBytes = new Uint8Array(await (await canvasToBlob(canvas, 'image/jpeg', quality)).arrayBuffer());
      if (newBytes.length >= srcBytes.length * 0.92) continue;  // keep original if gain is marginal
      const nd = dict.clone(doc.context);
      nd.set(PDFName.of('Width'), PDFNumber.of(w));
      nd.set(PDFName.of('Height'), PDFNumber.of(h));
      nd.set(PDFName.of('Length'), PDFNumber.of(newBytes.length));
      nd.set(PDFName.of('ColorSpace'), PDFName.of('DeviceRGB'));
      nd.set(PDFName.of('BitsPerComponent'), PDFNumber.of(8));
      nd.set(PDFName.of('Filter'), PDFName.of('DCTDecode'));
      nd.delete(PDFName.of('DecodeParms'));
      nd.delete(PDFName.of('Decode'));
      doc.context.assign(ref, PDFRawStream.of(nd, newBytes));
      recompressed++;
    } catch (e) { /* per-image failure: keep the original image stream untouched */ }
    if (onProgress && scanned % 25 === 0) onProgress(scanned / objs.length);
  }
  return recompressed;
}

/* --- PDF compression Tier 3: rasterize pages (explicit opt-in) --- */
async function rasterizePdf(file, quality, ctx) {
  const pdf = await openPdfJs(file);
  const out = await PDFLib.PDFDocument.create();
  for (let i = 1; i <= pdf.numPages; i++) {
    ctx.progress(`Rasterizing page ${i} of ${pdf.numPages}…`, 10 + Math.round(75 * (i - 1) / pdf.numPages));
    const { canvas, pageWidth, pageHeight } = await renderPdfPage(pdf, i, 150 / 72);
    const jpgBytes = new Uint8Array(await (await canvasToBlob(canvas, 'image/jpeg', quality)).arrayBuffer());
    const img = await out.embedJpg(jpgBytes);
    const page = out.addPage([pageWidth, pageHeight]);
    page.drawImage(img, { x: 0, y: 0, width: pageWidth, height: pageHeight });
  }
  return out;
}

/* ============================ SRT parsing ============================ */
function parseSrt(content) {
  const entries = [];
  const blocks = content.replace(/\r\n?/g, '\n').trim().split(/\n\s*\n/);
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    const tsIdx = lines.findIndex(l => l.includes('-->'));
    if (tsIdx === -1) continue;
    const m = lines[tsIdx].match(/(\d{2}):(\d{2}):(\d{2})[,.]\d{1,3}/);
    if (!m) continue;
    const h = parseInt(m[1], 10);
    const timestamp = h > 0 ? `${h}:${m[2]}:${m[3]}` : `${m[2]}:${m[3]}`;
    let text = lines.slice(tsIdx + 1).join(' ').replace(/<[^>]*>/g, '').trim();
    if (!text) continue;
    let speaker = null;
    const sm = text.match(/^([A-Za-z][A-Za-z0-9 .'\-]{0,29}):\s+(.+)$/);
    if (sm) { speaker = sm[1].trim(); text = sm[2].trim(); }
    entries.push({ timestamp, speaker, text });
  }
  return entries;
}

        note: `Re-encoded ${t.split('/')[1].toUpperCase()} via canvas${t === 'image/jpeg' ? ' (quality 95)' : ''} — EXIF, GPS and embedded metadata removed.`
      };
    }
    if (t === 'application/pdf' || n.endsWith('.pdf')) {
      ctx.progress('Removing PDF metadata…', 30);
      const src = await loadPdfLib(await readBytes(f));
      const out = await PDFLib.PDFDocument.create();
      (await out.copyPages(src, src.getPageIndices())).forEach(p => out.addPage(p));
      return {
        files: [{ blob: await savePdf(out), name: `${stripExt(f.name)}_no_metadata.pdf` }],
        note: 'Document info and metadata removed. Note: content inside pages (visible text, annotations) is preserved as-is.'
      };
    }
    if (isVideoFile(f) || isAudioFile(f)) {
      checkMediaSize(f);
      const out = await ffmpegJob(ctx, f, (i, o) => ['-i', i, '-map_metadata', '-1', '-c', 'copy', '-y', o], extOf(f.name));
      return {
        files: [{ blob: new Blob([out], { type: t || 'application/octet-stream' }), name: `${stripExt(f.name)}_no_metadata${extOf(f.name)}` }],
        note: 'All container metadata removed (audio/video streams copied without re-encoding — no quality loss).'
      };
    }
    throw new Error(`Metadata removal is not supported for this file type (${t || extOf(n) || 'unknown'}). Supported: images (JPEG/PNG/WebP), PDF, video and audio files.`);
  }
},

CARDS.forEach(c => { if (!c.options) c.options = []; });
const CARD_MAP = Object.fromEntries(CARDS.map(c => [c.id, c]));
const state = Object.fromEntries(CARDS.map(c => [c.id, { files: [], result: null, dims: null }]));
let openCardId = null;

/* ============================ UI generation ============================ */
function optRowHtml(card, o) {
  const id = `opt-${card.id}-${o.id}`;
  let ctrl;
  switch (o.type) {
    case 'select':
      ctrl = `<select id="${id}">${o.choices.map(([v, l]) => `<option value="${v}"${v === o.value ? ' selected' : ''}>${l}</option>`).join('')}</select>`; break;
    case 'number':
      ctrl = `<input type="number" id="${id}" value="${o.value}"${o.min != null ? ` min="${o.min}"` : ''}${o.max != null ? ` max="${o.max}"` : ''} step="${o.step || 1}">`; break;
    case 'text':
      ctrl = `<input type="text" id="${id}" placeholder="${o.placeholder || ''}">`; break;
    case 'range':
      ctrl = `<input type="range" id="${id}" min="${o.min}" max="${o.max}" value="${o.value}"><span class="rv" id="${id}-v">${o.value}${o.suffix || ''}</span>`; break;
    case 'radio':
      ctrl = o.choices.map(([v, l]) => `<label class="rl"><input type="radio" name="${id}" value="${v}"${v === o.value ? ' checked' : ''}> ${l}</label>`).join('<br>'); break;
    case 'checkbox':
      ctrl = `<input type="checkbox" id="${id}"${o.value ? ' checked' : ''}>`; break;
  }
  return `<div class="opt-row" id="row-${id}"><label>${o.label}</label><div class="ctrl">${ctrl}</div></div>`;
}

function getOptValue(card, oid) {
  const o = card.options.find(x => x.id === oid);
  const id = `opt-${card.id}-${oid}`;
  if (!o) return undefined;
  if (o.type === 'radio') {
    const el = document.querySelector(`input[name="${id}"]:checked`);
    return el ? el.value : o.value;
  }
  const el = $(id);
  if (!el) return o.value;
  return o.type === 'checkbox' ? el.checked : el.value;
}

function cardHtml(card, idx) {
  return `
  <div class="card" id="card-${card.id}">
    <div class="card-head" data-card="${card.id}">
      <div class="ic">${idx}</div>
      <div><div class="t">${card.title}</div><div class="d">${card.desc}</div></div>
      <button class="x hidden" data-close="${card.id}" title="Close">&times;</button>
    </div>
    <div class="card-body hidden" id="body-${card.id}">
      <div class="dz" id="dz-${card.id}">Drop ${card.multiple ? 'files' : 'a file'} here or click to browse
        <input type="file" id="file-${card.id}" accept="${card.accept}"${card.multiple ? ' multiple' : ''} hidden>
      </div>
      <div class="hidden" id="opts-${card.id}">
        ${card.multiple
          ? `<div class="flist" id="flist-${card.id}"></div><button class="addmore" id="add-${card.id}">+ Add more files</button>`
          : `<div class="fileinfo"><span id="fname-${card.id}"></span> <span class="fi-size" id="finfo-${card.id}"></span><button class="clear" id="clear-${card.id}" title="Remove file">&times;</button></div>
             <div class="hint hidden" id="hint-${card.id}"></div>`}
        ${card.options.map(o => optRowHtml(card, o)).join('')}
        <button class="go" id="go-${card.id}">${card.actionLabel}</button>
      </div>
      <div class="prog hidden" id="prog-${card.id}">
        <div class="pstat" id="pstat-${card.id}">Working…</div>
        <div class="bar"><div class="fill" id="pfill-${card.id}"></div></div>
        <div class="ppct" id="ppct-${card.id}">0%</div>
      </div>
      <div class="result hidden" id="res-${card.id}">
        <div class="ok">Done</div>
        <div class="rnote" id="rnote-${card.id}"></div>
        <button class="go" id="dl-${card.id}">Download</button>
        <button class="sec" id="again-${card.id}">Convert another</button>
      </div>
    </div>
  </div>`;
}

function buildUI() {
  $('cats').innerHTML = CATEGORIES.map((cat, ci) => `
    <section class="cat" id="cat-${cat.id}" style="--cat: ${cat.color}">
      <div class="cat-head"><span class="cat-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${cat.icon}</svg></span><h2>${cat.label}</h2><span class="key">${ci + 1}</span></div>
      <div class="cards">${CARDS.filter(c => c.cat === cat.id).map((c, i) => cardHtml(c, i + 1)).join('')}</div>
    </section>`).join('');
  CARDS.forEach(wireCard);
}

/* ============================ card behavior ============================ */
function showPanel(cardId, panel) {
  for (const p of ['dz', 'opts', 'prog', 'res'])
    $(`${p === 'dz' ? 'dz' : p}-${cardId}`).classList.toggle('hidden', p !== panel);
}

function applyShowIf(card) {
  for (const o of card.options) {
    if (!o.showIf) continue;
    $(`row-opt-${card.id}-${o.id}`).classList.toggle('hidden', !o.showIf(oid => getOptValue(card, oid)));
  }
}

function resetCard(card) {
  const st = state[card.id];
  st.files = []; st.result = null; st.dims = null;
  $(`file-${card.id}`).value = '';
  if (card.multiple) $(`flist-${card.id}`).innerHTML = '';
  showPanel(card.id, 'dz');
}

function openCard(cardId) {
  if (openCardId === cardId) return;
  if (openCardId) closeCard(openCardId);
  openCardId = cardId;
  const c = $(`card-${cardId}`);
  c.classList.add('open');
  $(`body-${cardId}`).classList.remove('hidden');
  c.querySelector('.x').classList.remove('hidden');
  c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeCard(cardId) {
  const c = $(`card-${cardId}`);
  if (!c) return;
  c.classList.remove('open');
  $(`body-${cardId}`).classList.add('hidden');
  c.querySelector('.x').classList.add('hidden');
  resetCard(CARD_MAP[cardId]);
  if (openCardId === cardId) openCardId = null;
}

function renderFileList(card) {
  const st = state[card.id];
  const list = $(`flist-${card.id}`);
  list.innerHTML = st.files.map((f, i) =>
    `<div class="fitem"><span>${esc(f.name)}</span><span class="sz">${fmtSize(f.size)}</span><button data-i="${i}" title="Remove">&times;</button></div>`).join('');
  list.querySelectorAll('button').forEach(btn => btn.addEventListener('click', () => {
    st.files.splice(parseInt(btn.dataset.i, 10), 1);
    if (st.files.length) renderFileList(card);
    else showPanel(card.id, 'dz');
  }));
}

async function acceptFiles(card, fileList) {
  const files = Array.from(fileList);
  if (!files.length) return;
  const st = state[card.id];
  try {
    if (card.multiple) {
      const ok = files.filter(card.filter);
      if (files.length - ok.length > 0) showError(`${files.length - ok.length} file(s) skipped — not supported by this tool.`);
      if (!ok.length) return;
      st.files.push(...ok);
      renderFileList(card);
    } else {
      const f = files[0];
      if (card.validate) card.validate(f);
      st.files = [f];
      $(`fname-${card.id}`).textContent = f.name;
      $(`finfo-${card.id}`).textContent = `(${fmtSize(f.size)})`;
      const hint = $(`hint-${card.id}`);
      if (hint) {
        const big = card.largeHint && f.size > 200 * 1048576;
        hint.classList.toggle('hidden', !big);
        if (big) hint.textContent = `Large file (${fmtSize(f.size)}) — processing may take several minutes.`;
      }
      if (card.fileInfo) await card.fileInfo(f, txt => { $(`finfo-${card.id}`).textContent = `(${fmtSize(f.size)} · ${txt})`; }, card);
    }
    showPanel(card.id, 'opts');
    applyShowIf(card);
  } catch (e) {
    resetCard(card);
    showError(e.message || String(e));
  }
}

async function runCard(card) {
  const st = state[card.id];
  if (!st.files.length) return;
  showPanel(card.id, 'prog');
  const ctx = {
    file: st.files[0],
    files: st.files,
    opt: oid => getOptValue(card, oid),
    progress: (phase, pct) => {
      $(`pstat-${card.id}`).textContent = phase;
      $(`pfill-${card.id}`).style.width = Math.min(100, pct) + '%';
      $(`ppct-${card.id}`).textContent = Math.round(Math.min(100, pct)) + '%';
    }
  };
  try {
    ctx.progress('Starting…', 2);
    const result = await card.run(ctx);
    ctx.progress('Complete', 100);
    st.result = result;
    const head = result.files.length === 1
      ? `${result.files[0].name} (${fmtSize(result.files[0].blob.size)})`
      : `${result.files.length} files ready — will download as one ZIP`;
    $(`rnote-${card.id}`).textContent = head + (result.note ? '\n' + result.note : '');
    $(`dl-${card.id}`).textContent = result.files.length === 1 ? 'Download' : `Download ZIP (${result.files.length} files)`;
    showPanel(card.id, 'res');
  } catch (e) {
    showPanel(card.id, 'opts');
    showError(e.message || String(e));
  }
}

async function downloadResult(card) {
  const r = state[card.id].result;
  if (!r) return;
  try {
    if (r.files.length === 1) downloadBlob(r.files[0].blob, r.files[0].name);
    else downloadBlob(await zipFiles(r.files), r.zipName || 'mediaprivacy_output.zip');
  } catch (e) { showError('Download failed: ' + (e.message || e)); }
}

function wireCard(card) {
  const id = card.id;
  const input = $(`file-${id}`);
  const dz = $(`dz-${id}`);

  $(`card-${id}`).querySelector('.card-head').addEventListener('click', e => {
    if (e.target.dataset.close) { e.stopPropagation(); closeCard(id); return; }
    openCard(id);
  });

  dz.addEventListener('click', () => input.click());
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    dz.classList.remove('over');
    acceptFiles(card, e.dataTransfer.files);
  });
  input.addEventListener('change', () => { acceptFiles(card, input.files); input.value = ''; });

  const opts = $(`opts-${id}`);
  opts.addEventListener('change', () => applyShowIf(card));
  opts.addEventListener('input', e => {
    if (e.target.type === 'range') {
      const o = card.options.find(x => `opt-${id}-${x.id}` === e.target.id);
      $(`${e.target.id}-v`).textContent = e.target.value + ((o && o.suffix) || '');
    }
  });

  $(`go-${id}`).addEventListener('click', () => runCard(card));
  $(`dl-${id}`).addEventListener('click', () => downloadResult(card));
  $(`again-${id}`).addEventListener('click', () => resetCard(card));
  if (!card.multiple) $(`clear-${id}`).addEventListener('click', () => resetCard(card));
  if (card.multiple) $(`add-${id}`).addEventListener('click', () => input.click());
  if (card.wire) card.wire(card);
}

/* ============================ global drop + keyboard ============================ */
function setupGlobal() {
  document.body.addEventListener('dragover', e => e.preventDefault());
  document.body.addEventListener('drop', e => {
    e.preventDefault();
    if (e.target.closest('.dz')) return; // card dropzone handles it
    const files = Array.from(e.dataTransfer.files);
    if (!files.length) return;
    const f = files[0];
    let target = null;
    if (isVideoFile(f)) target = 'video-audio';
    else if (f.type === 'application/pdf' || /\.pdf$/i.test(f.name)) target = files.length > 1 ? 'merge-pdf' : 'pdf-images';
    else if (f.type.startsWith('image/')) target = files.length > 1 ? 'images-pdf' : 'compress-image';
    else if (isAudioFile(f)) target = 'audio-mp3';
    if (!target) { showError(`Unsupported file type (${f.type || extOf(f.name) || 'unknown'}). Open a specific tool to see what it accepts.`); return; }
    openCard(target);
    acceptFiles(CARD_MAP[target], files);
  });

  document.addEventListener('keydown', e => {
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName) || e.target.isContentEditable) return;
    if (e.key === 'Escape' && openCardId) { closeCard(openCardId); return; }
    if (/^[1-4]$/.test(e.key)) {
      const cat = $(`cat-${CATEGORIES[parseInt(e.key, 10) - 1].id}`);
      if (cat) cat.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  });
}

/* ============================ init ============================ */
document.addEventListener('DOMContentLoaded', () => {
  if (typeof pdfjsLib !== 'undefined')
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.9.359/pdf.worker.min.js';
  buildUI();
  setupGlobal();
});
</script>
